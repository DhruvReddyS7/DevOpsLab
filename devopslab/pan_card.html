<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PAN Card</title>
  <style>
    body{font-family:Georgia,serif;background:#fff7ed;padding:24px}
    .card{width:420px;background:#fff;padding:16px;border-radius:6px;border:1px solid #f2d9b6}
    .title{font-weight:800;color:#a63e00}
    .row{display:flex;gap:12px;margin-top:12px}
    .photo{width:92px;height:112px;background:#fff3eb;border:1px solid #f0d7c0}
    .meta{flex:1}
    .label{font-size:12px;color:#7a5a48}
    .value{font-weight:700}
    .small{font-size:12px;color:#6b4f3a;margin-top:8px}
  </style>
</head>
<body>
  <div class="card">
    <div class="title">INCOME TAX DEPARTMENT</div>
    <div class="small">Permanent Account Number (PAN)</div>
    <div class="row">
      <div class="photo"></div>
      <div class="meta">
        <div class="label">Name</div>
        <div class="value">PRIYA SHARMA</div>
        <div class="label">PAN</div>
        <div class="value">ABCDE1234F</div>
        <div class="label">Father's Name</div>
        <div class="value">RAMESH SHARMA</div>
      </div>
    </div>
  </div>
</body>
</html>
