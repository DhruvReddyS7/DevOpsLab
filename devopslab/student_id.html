<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Student ID Card</title>
  <style>
    body{font-family:Verdana,Arial;background:#eef2ff;padding:24px}
    .card{width:360px;background:#fff;padding:14px;border-radius:8px;border:1px solid #dfe7ff}
    .school{font-weight:800;color:#0b3d91}
    .info{display:flex;gap:10px;margin-top:12px}
    .photo{width:88px;height:104px;background:#f3f6ff}
    .meta{flex:1}
    .label{font-size:12px;color:#6b7280}
    .value{font-weight:700}
    .footer{margin-top:10px;font-size:12px;color:#5b616b}
  </style>
</head>
<body>
  <div class="card">
    <div class="school">Springfield International School</div>
    <div class="info">
      <div class="photo"></div>
      <div class="meta">
        <div class="label">Student</div>
        <div class="value">AMIT VERMA</div>
        <div class="label">Class / Roll</div>
        <div class="value">10 / 23</div>
        <div class="label">Valid Till</div>
        <div class="value">31 Mar 2026</div>
      </div>
    </div>
    <div class="footer">ID No: STU2023-00023</div>
  </div>
</body>
</html>
