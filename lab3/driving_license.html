<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Driving License</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#f4fff6;padding:24px}
    .card{width:420px;background:#fff;padding:16px;border-radius:8px;border:1px solid #d6f1df}
    .title{font-weight:800;color:#0a6b2d}
    .row{display:flex;gap:12px;margin-top:12px}
    .photo{width:100px;height:120px;background:#eef9ef;border:1px solid #cfead1}
    .meta{flex:1}
    .label{font-size:12px;color:#3e6350}
    .value{font-weight:700}
    .small{font-size:12px;color:#4a4a4a;margin-top:8px}
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Regional Transport Office</div>
    <div class="small">Driving Licence</div>
    <div class="row">
      <div class="photo"></div>
      <div class="meta">
        <div class="label">Name</div>
        <div class="value">RAJESH KUMAR</div>
        <div class="label">DL No.</div>
        <div class="value">DL-07-20220012345</div>
        <div class="label">Valid Till</div>
        <div class="value">15 Aug 2031</div>
      </div>
    </div>
    <div class="small">Class: AM/FM &nbsp; | &nbsp; DOB: 05/06/1985</div>
  </div>
</body>
</html>
