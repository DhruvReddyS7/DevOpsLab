<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Driving License</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#f6fbf7;padding:28px;display:flex;align-items:center;justify-content:center}
    .card{width:520px;background:#fff;padding:18px;border-radius:8px;border:1px solid #dff4ea;box-shadow:0 6px 18px rgba(4,64,28,0.03)}
    .title{font-weight:800;color:#0b6b2e;font-size:15px}
    .row{display:flex;gap:14px;margin-top:12px}
    .photo{width:110px;height:130px;background:#f3fbf6;border:2px solid #d3f0df;border-radius:4px}
    .meta{flex:1}
    .label{font-size:11px;color:#274b3a}
    .value{font-weight:700;color:#092c18}
    .small{font-size:12px;color:#3b4f44;margin-top:8px}
    .badge{background:#e8faf0;color:#0b6b2e;padding:4px 8px;border-radius:4px;font-weight:700;font-size:12px;display:inline-block}
  </style>
</head>
<body>
  
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div class="title">Regional Transport Office</div>
        <div class="small">Driving Licence</div>
      </div>
      <div class="badge">DL</div>
    </div>
    <div class="row">
      <div class="photo" aria-hidden></div>
      <div class="meta">
        <div class="label">Name</div>
        <div class="value">RAJESH KUMAR</div>
        <div class="label">License No.</div>
        <div class="value">DL-07-20220012345</div>
        <div class="label">Valid Till</div>
        <div class="value">15 Aug 2031</div>
        <div class="label">Address</div>
        <div class="value">12, Nehru Street, Jaipur, Rajasthan</div>
      </div>
    </div>
    <div class="small">Class: AM/FM &nbsp; | &nbsp; DOB: 05/06/1985</div>
  </div>
</body>
</html>
