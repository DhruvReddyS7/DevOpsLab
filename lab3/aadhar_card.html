<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Aadhar Card</title>
  <style>
    body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#FF9500 0%,#FF6B35 100%);padding:40px;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .card{width:620px;background:linear-gradient(135deg,#FFF9F0,#FFF);padding:0;border-radius:16px;box-shadow:0 30px 60px rgba(0,0,0,0.3);overflow:hidden}
    .top-strip{background:linear-gradient(90deg,#FF9500,#FF6B35);padding:20px;color:white;display:flex;justify-content:space-between;align-items:center}
    .org-name{font-size:16px;font-weight:900}
    .gov-seal{width:50px;height:50px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#FF6B35;font-size:12px}
    .content{padding:28px;display:flex;gap:20px}
    .left{flex:0 0 140px}
    .photo-box{width:140px;height:170px;background:linear-gradient(135deg,#FFE4C4,#FFDAB9);border:3px dashed #FF9500;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:48px}
    .right{flex:1}
    .label{font-size:11px;color:#666;font-weight:600;text-transform:uppercase;margin-top:12px}
    .value{font-size:16px;font-weight:800;color:#000;margin-top:2px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .footer-strip{background:#FFE4C4;padding:16px;border-top:2px solid #FF9500;display:flex;justify-content:space-between;align-items:center;font-size:12px}
    .qr-placeholder{width:80px;height:80px;background:#F0F0F0;border:2px solid #FF9500;border-radius:4px}
  </style>
</head>
<body>
  <div class="card">
    <div class="top-strip">
      <div class="org-name">AADHAAR</div>
      <div class="gov-seal">🇮🇳</div>
    </div>
    <div class="content">
      <div class="left">
        <div class="photo-box">👤</div>
      </div>
      <div class="right">
        <div class="label">Unique Identification Authority of India</div>
        <div class="value">SANGEETA RAJESH</div>
        <div class="row">
          <div>
            <div class="label">Gender</div>
            <div class="value">Female</div>
          </div>
          <div>
            <div class="label">DOB</div>
            <div class="value">12/05/1988</div>
          </div>
        </div>
        <div class="label">Aadhaar Number</div>
        <div class="value" style="font-size:20px;letter-spacing:3px">1234 5678 9012</div>
        <div class="label">Address</div>
        <div class="value" style="font-size:13px">45 Park Avenue, Chennai, TN 600001</div>
      </div>
    </div>
    <div class="footer-strip">
      <div>Issued: 12/05/2020 | Valid: Lifetime</div>
      <div class="qr-placeholder"></div>
    </div>
  </div>
</body>
</html>
