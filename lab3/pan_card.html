<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PAN Card</title>
  <style>
    body{font-family:Georgia,serif;background:#fff7f0;padding:28px;display:flex;align-items:center;justify-content:center}
    .card{width:480px;background:#fff;padding:16px;border-radius:6px;border:1px solid #f3dcc2;box-shadow:0 6px 18px rgba(160,90,20,0.04)}
    .title{font-weight:900;color:#7a2e00;font-size:15px}
    .row{display:flex;gap:14px;margin-top:12px}
    .photo{width:96px;height:116px;background:#fff3eb;border:2px solid #f1d7bf;border-radius:4px}
    .meta{flex:1}
    .label{font-size:11px;color:#7a5a48}
    .value{font-weight:800;color:#3b220f}
    .small{font-size:12px;color:#6b4f3a;margin-top:8px}
    .gov{font-size:11px;color:#b45a00;margin-top:6px}
  </style>
</head>
<body>
  <div class="card">
    <div>
      <div class="title">INCOME TAX DEPARTMENT</div>
      <div class="gov">Permanent Account Number (PAN)</div>
    </div>
    <div class="row">
      <div class="photo" aria-hidden></div>
      <div class="meta">
        <div class="label">Name</div>
        <div class="value">PRIYA SHARMA</div>
        <div class="label">PAN</div>
        <div class="value">ABCDE1234F</div>
        <div class="label">Father's Name</div>
        <div class="value">RAMESH SHARMA</div>
      </div>
    </div>
    <div style="margin-top:10px;font-size:12px;color:#5b3f2b">Signature</div>
  </div>
</body>
</html>
